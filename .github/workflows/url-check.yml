name: URL Check

on:
  pull_request:
    # Only re-run when something that could contain URLs changes.
    paths:
      - "**.md"
      - "**.mdx"
      - "**.markdown"
      - "**.html"
      - "**.htm"
      - "**.yml"
      - "**.yaml"
      - "**.json"
      - "**.js"
      - "**.ts"
      - "**.tsx"
      - "**.jsx"
      - "**.py"
      - "**.txt"
      - "**.xml"
      - "**.svg"
      - ".github/scripts/check_urls.py"
      - ".github/workflows/url-check.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # Required to post the PR comment with the report.

concurrency:
  group: url-check-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  check_urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run URL checker
        id: run
        shell: bash
        run: |
          set +e
          # Always scan the entire repository on every PR.
          python .github/scripts/check_urls.py --timeout 20 --workers 16 2>&1 | tee /tmp/url_report.txt
          ec=${PIPESTATUS[0]}
          echo "exitcode=$ec" >> "$GITHUB_OUTPUT"
          exit 0   # We surface pass/fail via the dedicated step below.

      - name: Fallback job summary
        if: always()
        run: |
          # If the script never got to write $GITHUB_STEP_SUMMARY, surface the
          # raw report so contributors still see something on the run page.
          if [ ! -s "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo "### 🔗 URL Check (raw log)"
              echo ""
              echo '```'
              cat /tmp/url_report.txt 2>/dev/null || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build PR comment body
        if: always() && github.event_name == 'pull_request'
        id: comment
        env:
          EXITCODE: ${{ steps.run.outputs.exitcode }}
        run: |
          {
            echo "body<<EOF"
            echo "<!-- url-check-report -->"
            echo "## 🔗 URL Check Report"
            echo ""
            echo "Scope: entire repository."
            echo ""
            echo '<details><summary>Full report</summary>'
            echo ""
            echo '```'
            cat /tmp/url_report.txt 2>/dev/null || true
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            if [ -z "$EXITCODE" ] || [ "$EXITCODE" = "0" ]; then
              echo "✅ All probed URLs are reachable."
            else
              echo "❌ Some URLs are broken — see the report above."
            fi
            echo ""
            echo "_Automated by \`.github/workflows/url-check.yml\`._"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Find previous report comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/find-comment@v3
        id: find_comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- url-check-report -->"

      - name: Create or update PR comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body: ${{ steps.comment.outputs.body }}

      - name: Fail job on broken URLs
        if: steps.run.outputs.exitcode != '0'
        run: |
          echo "URL check failed with exit code ${{ steps.run.outputs.exitcode }}."
          exit 1
